<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge - Design Comparison</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D1117; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; color: #E6EDF3; }
  .header { padding: 24px; text-align: center; border-bottom: 1px solid #30363D; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 14px; color: #7D8590; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; height: calc(100vh - 80px); }
  .frame-wrap { border-right: 1px solid #30363D; display: flex; flex-direction: column; }
  .frame-wrap:last-child { border-right: none; }
  .frame-label { padding: 12px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #7D8590; border-bottom: 1px solid #30363D; background: #161B22; }
  iframe { flex: 1; border: none; width: 100%; }
  @media (max-width: 1024px) {
    .grid { grid-template-columns: 1fr; height: auto; }
    .frame-wrap { border-right: none; border-bottom: 1px solid #30363D; height: 80vh; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>World Cup Edge - Three Design Directions</h1>
  <p>1. Editorial Light &nbsp;&middot;&nbsp; 2. Analyst Dark &nbsp;&middot;&nbsp; 3. Broadcast Data Desk</p>
</div>
<div class="grid">
  <div class="frame-wrap">
    <div class="frame-label">Editorial Light</div>
    <iframe src="editorial-light.html"></iframe>
  </div>
  <div class="frame-wrap">
    <div class="frame-label">Analyst Dark</div>
    <iframe src="analyst-dark.html"></iframe>
  </div>
  <div class="frame-wrap">
    <div class="frame-label">Broadcast Data Desk</div>
    <iframe src="broadcast-data-desk.html"></iframe>
  </div>
</div>
</body>
</html>
