app = "world-cup-edge"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/api/health"

[mounts]
  source = "world_cup_edge_data"
  destination = "/app/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512